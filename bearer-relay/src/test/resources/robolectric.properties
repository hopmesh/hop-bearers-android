# Pin the Robolectric SDK image to a single widely-cached android-all jar rather than compileSdk.
# compileSdk moved to 37 (core-ktx 1.19.0's AAR metadata floor), which exceeds Robolectric's max
# shadow SDK (36); minSdk is 29 and none of the exercised paths need a newer framework, so pin to 33
# (the same image the driver + demo suites use).
sdk=33
